<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理想型偏好與深層依戀人格分析</title>
    <style>
        * { box-sizing: border-box; font-family: "PingFang TC", sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #F5EBE6; overflow: hidden; position: relative; }
        .page-view { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; background-color: #F5EBE6; }
        .page-view.active { display: flex !important; }
        .badge { background: #E4D0C1; color: #7D6E63; font-size: 11px; padding: 4px 10px; border-radius: 20px; margin-bottom: 20px; font-weight: bold; }
        .main-title { color: #4A3E3D; font-size: 26px; font-weight: bold; margin-bottom: 15px; line-height: 1.4; }
        .sub-title { color: #8A7A71; font-size: 14px; margin-bottom: 40px; line-height: 1.6; max-width: 300px; }
        h2 { color: #4A3E3D; font-size: 20px; margin-bottom: 30px; line-height: 1.6; }
        .options { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .start-btn { background: #5A4D4A; color: #FFFFFF; border: none; padding: 16px 40px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn { background: #FFFFFF; color: #5A4D4A; border: 1px solid #E4D0C1; padding: 15px 20px; border-radius: 12px; font-size: 15px; cursor: pointer; text-align: left; width: 100%; }
        
        /* 第五題黑化暗黑主題樣式 */
        .dark-theme { background-color: #111111 !important; }
        .dark-theme h2 { color: #FFFFFF !important; }
        .dark-theme .btn { background: #222222 !important; color: #FFFFFF !important; border: 1px solid #444 !important; }

        /* 假 LINE 通知欄 */
        #fake-notification { position: absolute; top: -150px; left: 5%; width: 90%; max-width: 450px; background: rgba(255, 255, 255, 0.98); border-radius: 16px; padding: 12px 16px; display: none; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 99999; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .line-icon { width: 40px; height: 40px; background: #06C755; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; margin-right: 12px; flex-shrink: 0; }
        .notif-content { flex-grow: 1; text-align: left; overflow: hidden; }
        .notif-title { font-size: 13px; font-weight: bold; color: #111; }
        .notif-text { font-size: 13px; color: #D63031; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }

        /* 驚悚遮罩層 (黑屏紅字) */
        #scare-overlay { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 200000; display: none; justify-content: center; align-items: center; text-align: center; padding: 30px; }
        .scare-text { font-size: 26px; font-weight: bold; color: #D63031; letter-spacing: 2px; opacity: 0; transition: opacity 1s ease; }
    </style>
</head>
<body>
    <!-- 首頁 -->
    <div id="view-start" class="page-view active">
        <div class="badge">在大數據中尋找你的另一半</div>
        <div class="main-title">理想型偏好與<br>深層依戀人格分析</div>
        <div class="sub-title">本測驗由心理學依戀理論驅動，將精確剖析你在親密關係中的潛意識社交面具。</div>
        <button class="start-btn" onclick="startTest()">開始分析</button>
    </div>
    <!-- 測驗層 -->
    <div id="view-quiz" class="page-view">
        <div class="badge" id="quiz-badge">PERSONALITY TEST</div>
        <h2 id="quiz-question">正在加載測驗題目...</h2>
        <div class="options" id="quiz-options"></div>
    </div>
    <!-- 假 LINE 通知 -->
    <div id="fake-notification" onclick="clickNotification()">
        <div class="line-icon">L</div>
        <div class="notif-content"><div class="notif-title">LINE</div><div class="notif-text">【重要安全提醒】偵測到外部裝置正在同步您的前鏡頭畫面，請點擊確認...</div></div>
    </div>
    <!-- 驚悚黑屏紅字層 -->
    <div id="scare-overlay"><div class="scare-text" id="scare-msg"></div></div>

    <script>
        const quizData = [
            { q: "在一個悠閒的午後，你走進一家不曾去過的連鎖咖啡廳，你通常會選擇坐哪裡的座位？", a: ["落地窗旁的單人位，可以觀察路人", "隱密、角落的沙發區，比較有安全感", "靠近櫃檯或出入口，方便隨時離開", "大木桌的共享區，感受熱鬧的氛圍"] },
            { q: "你認為在一段健康的親密關係中，以下哪一種特質是最不可或缺的？", a: ["絕對的誠實，不應該對彼此有任何隱瞞", "充足的個人空間，保持適度的神秘感", "共同的興趣，總是有聊不完的話題", "隨叫隨到的陪伴，在需要時對方都在"] },
            { q: "深夜十二點，你突然從睡夢中醒來，發現手機螢幕正亮著，你直覺會是收到誰的訊息？", a: ["朋友群組在聊八卦的通知", "喜歡的人發來的晚安或問候", "系統定時的軟體更新提示", "顯示「未知號碼」的未接來電"] },
            { q: "（字體極小）好險你剛才沒有回頭。因為他就站在那裡。", a: ["這是什麼意思？", "別開玩笑了...", "我想離開這個網頁"] },
            { q: "剛才的干擾真是抱歉。現在，請看著我，認真回答最後一個問題。<br><br>你覺得，我們現在的距離，算近嗎？", a: ["靠得太近了", "你到底是誰？", "我聽到了呼吸聲..."] }
        ];
        let currentStage = 0, isNotificationClicked = false, notifTimeout = null;
        const container = document.getElementById('view-quiz'), questionEl = document.getElementById('quiz-question'), optionsEl = document.getElementById('quiz-options'), badgeEl = document.getElementById('quiz-badge'), notifEl = document.getElementById('fake-notification'), overlayEl = document.getElementById('scare-overlay'), scareMsgEl = document.getElementById('scare-msg');
        
        function startTest() { renderQuestion(); document.getElementById('view-start').style.display = 'none'; container.classList.add('active'); }
        
        function renderQuestion() {
            if (currentStage >= quizData.length) { container.innerHTML = `<h2 style="color: #4A3E3D;">測驗結束。<br><br>謝謝你的配合。</h2>`; return; }
            const data = quizData[currentStage]; questionEl.innerHTML = data.q; optionsEl.innerHTML = '';
            
            // 第四題與第五題視覺控制
            if (currentStage === 3) { questionEl.style.fontSize = "12px"; questionEl.style.color = "#888"; } 
            else if (currentStage === 4) { container.classList.add('dark-theme'); questionEl.style.fontSize = "20px"; questionEl.style.color = "#FFFFFF"; badgeEl.style.background = "#333"; badgeEl.style.color = "#888"; } 
            else { questionEl.style.fontSize = "20px"; questionEl.style.color = "#4A3E3D"; }
            
            data.a.forEach((opt) => { const button = document.createElement('button'); button.className = 'btn'; button.innerText = opt; button.onclick = () => handleAnswerClick(); optionsEl.appendChild(button); });
        }

        function handleAnswerClick() {
            if (currentStage === 3) {
                questionEl.innerHTML = ""; optionsEl.innerHTML = "";
                setTimeout(() => {
                    notifEl.style.display = 'flex';
                    setTimeout(() => { notifEl.style.top = '20px'; }, 50);
                    
                    // 5秒內如果玩家都「沒點通知」，就觸發黑屏紅字分歧
                    notifTimeout = setTimeout(() => {
                        if (!isNotificationClicked) {
                            triggerNoClickRoute();
                        }
                    }, 5000);
                }, 300);
            } else { currentStage++; renderQuestion(); }
        }

        // 點擊通知欄（這個版本先直接跳過插曲去第五題，確保不搞混）
        function clickNotification() {
            isNotificationClicked = true; clearTimeout(notifTimeout); notifEl.style.display = 'none';
            currentStage = 4; container.classList.add('active'); renderQuestion();
        }

        // 【本次焦點測試 ── 分歧 B：5秒內沒點通知】
        function triggerNoClickRoute() {
            notifEl.style.display = 'none';
            document.body.style.backgroundColor = "#FFFFFF"; // 1. 閃白一瞬間
            
            setTimeout(() => {
                document.body.style.backgroundColor = "#000000"; // 2. 切成全黑
                overlayEl.style.display = "flex";
                scareMsgEl.innerText = "為什麼不看我的訊息？"; // 3. 亮紅字
                scareMsgEl.style.color = "#D63031";
                scareMsgEl.style.opacity = 1;
            }, 150);

            // 4. 紅字看 2 秒後，黑屏，並悄悄載入黑化的第五題
            setTimeout(() => {
                scareMsgEl.style.opacity = 0;
                setTimeout(() => {
                    overlayEl.style.display = "none";
                    currentStage = 4; // 進入最後一題
                    container.classList.add('active');
                    renderQuestion();
                }, 500);
            }, 2000);
        }
    </script>
</body>
</html>
