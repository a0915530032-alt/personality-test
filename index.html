<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理想型偏好與深層依戀人格分析</title>
    <style>
        * { box-sizing: border-box; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #F5EBE6; overflow: hidden; position: relative; }
        .page-view { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; background-color: #F5EBE6; }
        .page-view.active { display: flex !important; }
        .badge { background: #E4D0C1; color: #7D6E63; font-size: 11px; padding: 4px 10px; border-radius: 20px; margin-bottom: 20px; font-weight: bold; letter-spacing: 1px; }
        .main-title { color: #4A3E3D; font-size: 26px; font-weight: bold; margin-bottom: 15px; line-height: 1.4; letter-spacing: 1px; }
        .sub-title { color: #8A7A71; font-size: 14px; margin-bottom: 40px; line-height: 1.6; max-width: 300px; }
        h2 { color: #4A3E3D; font-size: 20px; margin-bottom: 30px; line-height: 1.6; word-break: break-all; }
        .options { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .start-btn { background: #5A4D4A; color: #FFFFFF; border: none; padding: 16px 40px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; letter-spacing: 2px; box-shadow: 0 4px 15px rgba(90,77,74,0.3); }
        .btn { background: #FFFFFF; color: #5A4D4A; border: 1px solid #E4D0C1; padding: 15px 20px; border-radius: 12px; font-size: 15px; cursor: pointer; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.02); width: 100%; }
    </style>
</head>
<body>

    <!-- 頁面 1：優雅首頁 -->
    <div id="view-start" class="page-view active">
        <div class="badge">在大數據中尋找你的另一半</div>
        <div class="main-title">理想型偏好與<br>深層依戀人格分析</div>
        <div class="sub-title">本測驗由心理學依戀理論（Attachment Theory）驅動，將精確剖析你在親密關係中的潛意識社交面具。</div>
        <button class="start-btn" onclick="startTest()">開始分析</button>
    </div>

    <!-- 頁面 2：主測驗容器 -->
    <div id="view-quiz" class="page-view">
        <div class="badge">PERSONALITY TEST</div>
        <h2 id="quiz-question">正在加載測驗題目...</h2>
        <div class="options" id="quiz-options"></div>
    </div>

    <script>
        const quizData = [
            { q: "在一個悠閒的午後，你走進一家不曾去過的連鎖咖啡廳，你通常會選擇坐哪裡的座位？", a: ["落地窗旁的單人位，可以觀察路人", "隱密、角落的沙發區，比較有安全感", "靠近櫃檯或出入口，方便隨時離開", "大木桌的共享區，感受熱鬧的氛圍"] },
            { q: "你認為在一段健康的親密關係中，以下哪一種特質是最不可或缺的？", a: ["絕對的誠實，不應該對彼此有任何隱瞞", "充足的個人空間，保持適度的神秘感", "共同的興趣，總是有聊不完的話題", "隨叫隨到的陪伴，在需要時對方都在"] },
            { q: "深夜十二點，你突然從睡夢中醒來，發現手機螢幕正亮著，你直覺會是收到誰的訊息？", a: ["朋友群組在聊八卦的通知", "喜歡的人發來的晚安或問候", "系統定時的軟體更新提示", "顯示「未知號碼」的未接來電"] }
        ];
        let currentStage = 0;
        const container = document.getElementById('view-quiz'), questionEl = document.getElementById('quiz-question'), optionsEl = document.getElementById('quiz-options');

        function startTest() {
            renderQuestion();
            document.getElementById('view-start').style.display = 'none';
            container.classList.add('active');
        }

        function renderQuestion() {
            if (currentStage >= quizData.length) {
                container.innerHTML = `<h2 style="color: #4A3E3D;">測驗結束。<br><br>謝謝你的配合！純測驗功能測試完全成功！</h2>`;
                return;
            }
            const data = quizData[currentStage];
            questionEl.innerHTML = data.q;
            optionsEl.innerHTML = '';
            
            data.a.forEach((opt) => {
                const button = document.createElement('button');
                button.className = 'btn';
                button.innerText = opt;
                button.onclick = () => { currentStage++; renderQuestion(); };
                optionsEl.appendChild(button);
            });
        }
    </script>
</body>
</html>
