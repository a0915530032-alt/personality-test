<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理想型偏好與深層依戀人格分析</title>
    <style>
        * { box-sizing: border-box; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #F5EBE6; overflow: hidden; position: relative; }
        
        /* 首頁區塊 */
        #start-page { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 30px; text-align: center; position: absolute; width: 100%; top: 0; left: 0; z-index: 99; background-color: #F5EBE6; }
        .main-title { color: #4A3E3D; font-size: 26px; font-weight: bold; margin-bottom: 15px; line-height: 1.4; letter-spacing: 1px; }
        .sub-title { color: #8A7A71; font-size: 14px; margin-bottom: 40px; line-height: 1.6; max-width: 300px; }
        .start-btn { background: #5A4D4A; color: #FFFFFF; border: none; padding: 16px 40px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; letter-spacing: 2px; box-shadow: 0 4px 15px rgba(90,77,74,0.3); }

        /* 測驗容器 (修正點：不使用 pointer-events，直接用傳統 display 切換控制) */
        .container { display: none; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 30px; text-align: center; position: absolute; width: 100%; top: 0; left: 0; z-index: 10; }
        
        .badge { background: #E4D0C1; color: #7D6E63; font-size: 11px; padding: 4px 10px; border-radius: 20px; margin-bottom: 20px; font-weight: bold; letter-spacing: 1px; }
        h2 { color: #4A3E3D; font-size: 20px; margin-bottom: 30px; line-height: 1.6; word-break: break-all; }
        .options { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .btn { background: #FFFFFF; color: #5A4D4A; border: 1px solid #E4D0C1; padding: 15px 20px; border-radius: 12px; font-size: 15px; cursor: pointer; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.02); width: 100%; }

        .dark-theme .btn { background: #222222; color: #FFFFFF !important; border: 1px solid #444; }

        /* 偽造的 LINE 通知欄 */
        #fake-notification { position: absolute; top: -150px; left: 5%; width: 90%; max-width: 450px; background: rgba(255, 255, 255, 0.98); border-radius: 16px; padding: 12px 16px; display: none; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 99999; transition: top 0.4s ease; cursor: pointer; }
        .line-icon { width: 40px; height: 40px; background: #06C755; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 18px; margin-right: 12px; flex-shrink: 0; }
        .notif-content { flex-grow: 1; text-align: left; overflow: hidden; }
        .notif-title { font-size: 13px; font-weight: bold; color: #111; margin-bottom: 2px; }
        .notif-text { font-size: 13px; color: #D63031; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; white-space: normal; }

        /* 偽造的 LINE 聊天畫面 */
        #fake-line-app { position: absolute; width: 100%; height: 100%; top: 0; left: 100%; background: #7494C4; z-index: 100000; transition: left 0.3s ease; display: flex; flex-direction: column; }
        #fake-line-app.active { left: 0; }
        .line-header { height: 56px; background: #2c3e50; color: white; display: flex; align-items: center; padding: 0 15px; font-size: 17px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .line-chat-box { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-row { display: flex; gap: 10px; width: 100%; align-items: flex-start; }
        .avatar { width: 40px; height: 40px; background-color: #bdc3c7; border-radius: 50%; position: relative; flex-shrink: 0; display: flex; justify-content: center; align-items: center; }
        .avatar::before { content: ''; width: 16px; height: 16px; background: #ecf0f1; border-radius: 50%; position: absolute; top: 6px; }
        .avatar::after { content: ''; width: 26px; height: 14px; background: #ecf0f1; border-radius: 13px 13px 0 0; position: absolute; bottom: 2px; }
        .msg-content-wrapper { display: flex; flex-direction: column; gap: 2px; max-width: 70%; }
        .sender-name { font-size: 11px; color: #eef2f3; padding-left: 2px; }
        .msg-bubble { background: white; color: #111; padding: 10px 14px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-break: break-all; animation: pop 0.1s ease-out forwards; transform: scale(0); transform-origin: left top; }
        @keyframes pop { to { transform: scale(1); } }
        .line-footer { height: 50px; background: #F6F6F6; border-top: 1px solid #DDD; display: flex; align-items: center; padding: 0 15px; color: #B9B9B9; font-size: 15px; }

        /* 驚悚遮罩層 */
        #scare-overlay { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 200000; display: none; justify-content: center; align-items: center; text-align: center; padding: 30px; }
        .scare-text { font-size: 26px; font-weight: bold; color: #D63031; letter-spacing: 2px; line-height: 1.8; opacity: 0; transition: opacity 1s ease; }
        
        .noise-bg { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://w3.org id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.25'/%3E%3C/svg%3E"); }
    </style>
</head>
<body>

    <!-- 首頁 -->
    <div id="start-page">
        <div class="badge">在大數據中尋找你的另一半</div>
        <div class="main-title">理想型偏好與<br>深層依戀人格分析</div>
        <div class="sub-title">本測驗由心理學依戀理論（Attachment Theory）驅動，將精確剖析你在親密關係中的潛意識社交面具與隱性性格特質。</div>
        <button class="start-btn" onclick="startQuiz()">開始分析</button>
    </div>

    <!-- 假 LINE 通知 -->
    <div id="fake-notification" onclick="clickNotification()">
        <div class="line-icon">L</div>
        <div class="notif-content">
            <div class="notif-title">LINE</div>
            <div class="notif-text">【重要安全提醒】偵測到外部裝置正在同步您的前鏡頭畫面，請點擊確認...</div>
        </div>
    </div>

    <!-- 假 LINE 聊天室 -->
    <div id="fake-line-app">
        <div class="line-header">＜ unknown</div>
        <div class="line-chat-box" id="chat-box"></div>
        <div class="line-footer">無法輸入訊息...</div>
    </div>

    <!-- 驚悚分歧特效遮罩 -->
    <div id="scare-overlay">
        <div class="scare-text" id="scare-msg"></div>
    </div>

    <!-- 主測驗容器 -->
    <div class="container" id="quiz-container">
        <div class="badge" id="quiz-badge">PERSONALITY TEST</div>
        <h2 id="quiz-question">正在加載測驗題目...</h2>
        <div class="options" id="quiz-options"></div>
    </div>

    <script>
        const quizData = [
            {
                q: "在一個悠閒的午後，你走進一家不曾去過的連鎖咖啡廳，你通常會選擇坐哪裡的座位？",
                a: ["落地窗旁的單人位，可以觀察路人", "隱密、角落的沙發區，比較有安全感", "靠近櫃檯或出入口，方便隨時離開", "大木桌的共享區，感受熱鬧的氛圍"]
            },
            {
                q: "你認為在一段健康的親密關係中，以下哪一種特質是最不可或缺的？",
                a: ["絕對的誠實，不應該對彼此有任何隱瞞", "充足的個人空間，保持適度的神秘感", "共同的興趣，總是有聊不完的話題", "隨叫隨到的陪伴，在需要時對方都在"]
            },
            {
                q: "深夜十二點，你突然從睡夢中醒來，發現手機螢幕正亮著，你直覺會是收到誰的訊息？",
                a: ["朋友群組在聊八卦的通知", "喜歡的人發來的晚安或問候", "系統定時的軟體更新提示", "顯示「未知號碼」的未接來電"]
            },
            {
                q: "（字體極小）好險你剛才沒有回頭。因為他就站在那裡。",
                a: ["這是什麼意思？", "別開玩笑了...", "我想離開這個網頁"]
            },
            {
                q: "剛才的干擾真是抱歉。現在，請看著我，認真回答最後一個問題。<br><br>你覺得，我們現在的距離，算近嗎？",
                a: ["靠得太近了", "你到底是誰？", "我聽到了呼吸聲..."]
            }
        ];

        let currentStage = 0;
        let isNotificationClicked = false;
        let notifTimeout = null;

        const container = document.getElementById('quiz-container');
        const questionEl = document.getElementById('quiz-question');
        const optionsEl = document.getElementById('quiz-options');
        const badgeEl = document.getElementById('quiz-badge');
        const notifEl = document.getElementById('fake-notification');
        const overlayEl = document.getElementById('scare-overlay');
        const scareMsgEl = document.getElementById('scare-msg');

        // 徹底重構：完全捨棄 pointer-events，改用絕對安全的網頁原生顯示切換
        function startQuiz() {
            renderQuiz(); 
            document.getElementById('start-page').style.display = 'none';
            container.style.display = 'flex';
            playSound('warmup'); // 順便在背景無聲啟用音效環境
        }

        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if(!ctx) return;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'line') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(880, ctx.currentTime);
                    osc.frequency.setValueAtTime(1046.5, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'bomb') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(520, ctx.currentTime);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
